<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIF Sign In</title>
    <style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#fff;
    padding:30px 35px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    width:100%;
    max-width:350px;
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    text-align:left;
    font-weight:bold;
    margin-bottom:5px;
    color:#555;
}

input{
    width:100%;
    max-width:280px;
    padding:12px;
    margin:10px auto 20px auto;
    border:1px solid #ccc;
    border-radius:6px;
    display:block;
    transition:0.3s;
}

input:focus{
    border-color:#4facfe;
    outline:none;
    box-shadow:0 0 5px rgba(79,172,254,0.5);
}

button{
    width:100%;
    max-width:280px;
    padding:12px;
    background:#4facfe;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#007bff;
}

.note{
    font-size:13px;
    color:#777;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
    <h2>YIF Member Sign In</h2>

    <div id="message" class="error"></div>

    <form id="signin-form" method="post" action="signin_process.php">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
        <p><a href="forgot_password.html">Forgot Password?</a></p>
    </form>
</div>

</body>
</html>
